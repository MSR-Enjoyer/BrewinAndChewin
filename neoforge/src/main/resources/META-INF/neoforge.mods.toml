modLoader="javafml"
loaderVersion="${neoforge_loader_version_range}"
issueTrackerURL = "https://github.com/${sources}/issues"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${minecraft_version}-${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
logoBlur=false
authors="${neoforge_mod_authors}"
description='''
${mod_description}
'''
enumExtensions="brewinandchewin_extensions.json"

[[mixins]]
config = "${mod_id}.mixins.json"
[[mixins]]
config = "${mod_id}.neoforge.mixins.json"

[[dependencies.${mod_id}]]
modId="neoforge"
mandatory=true
versionRange="${neoforge_loader_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${neoforge_minecraft_version_range}"
ordering="NONE"
side="BOTH"